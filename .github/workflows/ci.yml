name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  # ort downloads the native ONNX Runtime library automatically
  ORT_STRATEGY: download
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Build & Test (Fedora 43)
    runs-on: ubuntu-latest
    container:
      image: fedora:43

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            git \
            curl \
            gcc \
            clang \
            lld \
            cmake \
            pkg-config \
            pam-devel \
            kernel-headers \
            libv4l-devel \
            openssl-devel \
            fontconfig-devel \
            dbus-devel \
            systemd-devel \
            selinux-policy-devel \
            checkpolicy \
            policycoreutils \
            policycoreutils-python-utils

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-registry-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target/
          key: cargo-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('**/*.rs') }}
          restore-keys: |
            cargo-build-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}-
            cargo-build-${{ runner.os }}-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (debug)
        run: cargo build --all-targets

      - name: Test
        run: cargo test

      - name: Build (release)
        run: cargo build --release -p face-authd -p face-enroll

      - name: Verify binaries exist
        run: |
          ls -lh target/release/face-authd target/release/face-enroll
